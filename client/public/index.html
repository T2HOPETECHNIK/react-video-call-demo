<!DOCTYPE html>
<html lang="en">

<head>
  <title>Your Video Share</title>
  <meta charset="utf-8" />
  <link rel="icon" href="favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#000000" />
  <meta name="description"
    content="A real-time video calling application that allows users to connect with each other, providing the ability to initiate video calls and control their audio and video settings." />
  <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
  <link rel="apple-touch-icon" href="favicon.png" />
  <!-- Polyfill Node globals that simple-peer / readable-stream expect.
       Create-React-App 5 (webpack 5) no longer provides these, which caused
       "process is not defined" when tearing down a peer on hang-up. -->
  <script>
    window.global = window;
    window.process = window.process || { env: {} };
    if (!window.process.nextTick) {
      window.process.nextTick = function (cb) {
        var args = Array.prototype.slice.call(arguments, 1);
        setTimeout(function () { cb.apply(null, args); }, 0);
      };
    }
  </script>
</head>

<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root"></div>
</body>

</html>
